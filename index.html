<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Accu-Login</title>
    <meta charset="utf-8">
    <link rel="stylesheet" href="main.css">
  </head>
  <body>
    <header>
      <h1>Accu-Login</h1>
    </header>
    <div class="addressForm">
    <form>
      <fieldset>
        <legend>Job Address</legend>
        <div id="flexbox-JobAddress">
          <tb>
            <tr>
              <th>
              <input type="field" id="workAddress" style="padding-left: 5px; text-align: center; float: left;"></input>
              </th>
            </tr>
          </tb>
        </div>
      </fieldset>
    </div>
    </form>
    <div class="loginForm">
    <form>
      <fieldset>
        <legend>Tech Select</legend>
        
        <input type="radio" id="adrian" name="tech" value="AD"></input>
        <label for="adrian">Adrian</label>

        <input type="radio" id="fred" name="tech" value="FS"></input>
        <label for="fred">Fred</label>

        <input type="radio" id="marlon" name="tech" value="MB"></input>
        <label for="marlon">Marlon</label>

        <input type="radio" id="clinton" name="tech" value="MB"></input>
        <label for="clinton">Clinton</label>

        <input type="radio" id="arian" name="engineer" value="AT"></input>
        <label for="arian">Arian</label>

        <input type="radio" id="swapnil" name="engineer" value="SG"></input>
        <label for="swapnil">Swapnil</label>

      </fieldset>
    </form>
    </div>
    <div class="coworkerForm">
      <form>
        <fieldset>
          <legend>Coworker Select</legend>

          <input type="checkbox" id="adrianField" name="field">
          <label for="adrianField">AD</label>

          <input type="checkbox" id="fredField" name="field">
          <label for="fredField">FS</label>

          <input type="checkbox" id="marlonField" name="field">
          <label for="marlonField">MB</label>

          <input type="checkbox" id="clintonField" name="field">
          <label for="clintonField">CW</label>

          <input type="checkbox" id="arianField" name="field">
          <label for="arianField">AT</label>

          <input type="checkbox" id="swapnilField" name="field">
          <label for="swapnilField">SG</label>

        </fieldset>
      </form>
    </div>
    <br>
    <div id="button">
    <button id="clockinButton" type="button" onclick="notifOne()">Clock-in</button>
    <button id="clockoutButton" type="button" onclick="notifTwo()">Clock-out</button>
    <p id="date" style="color: black; font-size: small;"></p>
    </div>
    <script>
      const d = new Date();
      let text = d.toString();
      document.getElementById("date").innerHTML = text;

      function collectFormData() {
        const address = document.getElementById("workAddress").value.trim();

        const techRadio = document.querySelector('.loginForm input[name="tech"]:checked');
        const engineerRadio = document.querySelector('.loginForm input[name="engineer"]:checked');
        const tech = techRadio ? techRadio.labels[0].textContent : "None";
        const engineer = engineerRadio ? engineerRadio.labels[0].textContent : "None";

        const coworkerCheckboxes = document.querySelectorAll('.coworkerForm input[name="field"]:checked');
        const coworkers = coworkerCheckboxes.length
          ? Array.from(coworkerCheckboxes).map(cb => cb.labels[0].textContent).join(", ")
          : "None";

        return { address, tech, engineer, coworkers };
      }

      function notifOne() {
        const { address, tech, engineer, coworkers } = collectFormData();
        alert(
          "Clocked in at:\n" + text +
          "\n\nJob Address: " + (address || "Not provided") +
          "\nTech: " + tech +
          "\nEngineer: " + engineer +
          "\nCoworkers: " + coworkers
        );
      }

      function notifTwo() {
        const { address, tech, engineer, coworkers } = collectFormData();
        alert(
          "Clocked out at:\n" + text +
          "\n\nJob Address: " + (address || "Not provided") +
          "\nTech: " + tech +
          "\nEngineer: " + engineer +
          "\nCoworkers: " + coworkers
        );
      }
    </script>
  </body>
</html>
